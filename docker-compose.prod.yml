# Production stack for Toptier AI OCR on a single EC2 t3.micro
#
#   - seekdb        : OceanBase SeekDB (MySQL-compatible) on internal network
#   - app           : Bun + Hono server, persistent uploads volume
#   - cloudflared   : tunnel exposing the app at toptierocr.toptierdigital.space
#
# Run from the repo root on the EC2 host:
#   docker compose -f docker-compose.prod.yml up -d

services:
  seekdb:
    image: oceanbase/seekdb:latest
    container_name: tocr-seekdb
    restart: unless-stopped
    environment:
      MODE: mini
    volumes:
      - seekdb_data:/var/lib/oceanbase
    healthcheck:
      test: ["CMD", "bash", "-lc", "mysql -h127.0.0.1 -P2881 -uroot -p${DB_ROOT_PASSWORD} -e 'select 1' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s
    networks:
      - tocr

  app:
    build: .
    container_name: tocr-app
    restart: unless-stopped
    depends_on:
      seekdb:
        condition: service_healthy
    environment:
      PORT: 3737
      NODE_ENV: production
      DB_HOST: seekdb
      DB_PORT: 2881
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      MASTER_KEY_BASE64: ${MASTER_KEY_BASE64}
      DEFAULT_TENANT_ID: 1
      STORAGE_ROOT: /app/uploads
    volumes:
      - app_uploads:/app/uploads
    networks:
      - tocr

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tocr-cloudflared
    restart: unless-stopped
    depends_on:
      - app
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN}
    networks:
      - tocr

volumes:
  seekdb_data:
  app_uploads:

networks:
  tocr:
    driver: bridge
